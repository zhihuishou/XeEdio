{% extends "base.html" %}
{% block title %}审核 - 视频生产平台{% endblock %}
{% block nav_reviews %}active{% endblock %}
{% block topbar %}<span class="text-sm font-semibold text-slate-700">内容审核</span>{% endblock %}
{% block content %}
<div x-data="reviewsPage()" x-init="init()">
    <!-- Page Header -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">视频审核</h1>
        <p class="text-sm text-gray-500 mt-1">审核待发布的视频内容</p>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="flex justify-center py-12">
        <svg class="animate-spin h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
    </div>

    <!-- Review List -->
    <div x-show="!loading && reviews.length > 0" class="space-y-4">
        <template x-for="item in reviews" :key="item.id">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-start justify-between mb-4">
                    <div>
                        <h3 class="text-sm font-semibold text-gray-800" x-text="item.topic || '未命名任务'"></h3>
                        <p class="text-xs text-gray-500 mt-1">提交时间: <span x-text="formatTime(item.updated_at)"></span></p>
                    </div>
                    <span class="bg-yellow-100 text-yellow-700 px-2.5 py-0.5 rounded-full text-xs font-medium">待审核</span>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <!-- Video Preview -->
                    <div>
                        <p class="text-xs font-medium text-gray-600 mb-2">视频预览</p>
                        <div x-show="item.video_path" class="rounded-md overflow-hidden border border-gray-200">
                            <video :src="'/static/' + item.video_path" controls class="w-full"></video>
                        </div>
                        <div x-show="!item.video_path" class="bg-gray-100 rounded-md p-8 text-center">
                            <p class="text-sm text-gray-500">暂无视频</p>
                        </div>
                    </div>
                    <!-- Copy Content -->
                    <div>
                        <p class="text-xs font-medium text-gray-600 mb-2">文案内容</p>
                        <div class="bg-gray-50 rounded-md p-3 text-xs text-gray-700 whitespace-pre-wrap max-h-48 overflow-y-auto"
                             x-text="item.copywriting_filtered || item.copywriting_raw || '暂无文案'"></div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center space-x-3 mt-4 pt-4 border-t border-gray-100">
                    <button @click="approveTask(item)" :disabled="processing"
                        class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 cursor-pointer transition-colors duration-200 text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                        通过
                    </button>
                    <button @click="openRejectModal(item)" :disabled="processing"
                        class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 cursor-pointer transition-colors duration-200 text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                        拒绝
                    </button>
                </div>
            </div>
        </template>
    </div>

    <!-- Empty State -->
    <div x-show="!loading && reviews.length === 0" class="text-center py-12">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="mt-2 text-gray-500">暂无待审核任务</p>
    </div>

    <!-- Reject Modal -->
    <div x-show="showRejectModal" class="fixed inset-0 z-40 overflow-y-auto" x-transition>
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 bg-black/50" @click="showRejectModal = false"></div>
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full relative z-50 p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">拒绝原因</h3>
                <div>
                    <textarea x-model="rejectReason" rows="4" placeholder="请填写拒绝原因（必填）..."
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
                </div>
                <div class="flex justify-end space-x-3 mt-4">
                    <button @click="showRejectModal = false"
                        class="px-4 py-2 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors duration-200">取消</button>
                    <button @click="rejectTask()" :disabled="!rejectReason.trim() || processing"
                        class="px-4 py-2 bg-red-600 text-white rounded-md text-sm hover:bg-red-700 cursor-pointer transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        确认拒绝
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function reviewsPage() {
    return {
        reviews: [],
        loading: false,
        processing: false,
        showRejectModal: false,
        rejectTarget: null,
        rejectReason: '',

        async init() {
            await this.loadReviews();
        },

        async loadReviews() {
            this.loading = true;
            try {
                const data = await apiCall('GET', '/api/reviews/pending');
                if (data) this.reviews = data.items || data.tasks || data || [];
            } catch (e) {
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '加载审核列表失败', type: 'error' } }));
            } finally {
                this.loading = false;
            }
        },

        async approveTask(item) {
            this.processing = true;
            try {
                await apiCall('POST', `/api/reviews/${item.id}/approve`);
                this.reviews = this.reviews.filter(r => r.id !== item.id);
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '已通过', type: 'success' } }));
            } catch (e) {
                const msg = e.data?.error?.message || '操作失败';
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: msg, type: 'error' } }));
            } finally {
                this.processing = false;
            }
        },

        openRejectModal(item) {
            this.rejectTarget = item;
            this.rejectReason = '';
            this.showRejectModal = true;
        },

        async rejectTask() {
            if (!this.rejectTarget || !this.rejectReason.trim()) return;
            this.processing = true;
            try {
                await apiCall('POST', `/api/reviews/${this.rejectTarget.id}/reject`, { reason: this.rejectReason });
                this.reviews = this.reviews.filter(r => r.id !== this.rejectTarget.id);
                this.showRejectModal = false;
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '已拒绝', type: 'success' } }));
            } catch (e) {
                const msg = e.data?.error?.message || '操作失败';
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: msg, type: 'error' } }));
            } finally {
                this.processing = false;
            }
        },

        formatTime(ts) {
            if (!ts) return '-';
            return new Date(ts).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }
    };
}
</script>
{% endblock %}
