{% extends "base.html" %}
{% block title %}用户管理 - 视频生产平台{% endblock %}
{% block content %}
<div x-data="adminUsersPage()" x-init="init()">
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">用户管理</h1>
        <button @click="openCreateModal()"
            class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 cursor-pointer transition-colors duration-200 text-sm font-medium">
            添加用户
        </button>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="flex justify-center py-12">
        <svg class="animate-spin h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
    </div>

    <!-- User Table -->
    <div x-show="!loading" class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">用户名</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">角色</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建时间</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">操作</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <template x-for="user in users" :key="user.id">
                    <tr>
                        <td class="px-6 py-4 text-sm text-gray-800" x-text="user.username"></td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                                  :class="{'bg-red-100 text-red-700': user.role==='admin', 'bg-blue-100 text-blue-700': user.role==='operator', 'bg-gray-100 text-gray-700': user.role==='intern'}"
                                  x-text="getRoleLabel(user.role)"></span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500" x-text="formatTime(user.created_at)"></td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button @click="openEditModal(user)" class="text-blue-600 hover:text-blue-800 text-sm cursor-pointer">编辑</button>
                            <button @click="confirmDelete(user)" class="text-red-600 hover:text-red-800 text-sm cursor-pointer">删除</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
        <div x-show="users.length === 0" class="text-center py-8 text-gray-500 text-sm">暂无用户</div>
    </div>

    <!-- Create/Edit Modal -->
    <div x-show="showModal" class="fixed inset-0 z-40 overflow-y-auto" x-transition>
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 bg-black/50" @click="showModal = false"></div>
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full relative z-50 p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4" x-text="editingUser ? '编辑用户' : '添加用户'"></h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" x-model="form.username" :disabled="!!editingUser"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm disabled:bg-gray-100">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" x-text="editingUser ? '新密码（留空不修改）' : '密码'"></label>
                        <input type="password" x-model="form.password"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">角色</label>
                        <select x-model="form.role"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <option value="intern">实习生</option>
                            <option value="operator">运营</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button @click="showModal = false"
                        class="px-4 py-2 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors duration-200">取消</button>
                    <button @click="saveUser()" :disabled="saving || !form.username.trim()"
                        class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 cursor-pointer transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span x-show="!saving">保存</span>
                        <span x-show="saving">保存中...</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation -->
    <div x-show="showDeleteModal" class="fixed inset-0 z-40 overflow-y-auto" x-transition>
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 bg-black/50" @click="showDeleteModal = false"></div>
            <div class="bg-white rounded-lg shadow-xl max-w-sm w-full relative z-50 p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-2">确认删除</h3>
                <p class="text-sm text-gray-600 mb-4">确定要删除用户 "<span x-text="deleteTarget?.username"></span>" 吗？</p>
                <div class="flex justify-end space-x-3">
                    <button @click="showDeleteModal = false"
                        class="px-4 py-2 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors duration-200">取消</button>
                    <button @click="deleteUser()"
                        class="px-4 py-2 bg-red-600 text-white rounded-md text-sm hover:bg-red-700 cursor-pointer transition-colors duration-200">删除</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function adminUsersPage() {
    return {
        users: [],
        loading: false,
        showModal: false,
        showDeleteModal: false,
        editingUser: null,
        deleteTarget: null,
        saving: false,
        form: { username: '', password: '', role: 'intern' },

        async init() {
            await this.loadUsers();
        },

        async loadUsers() {
            this.loading = true;
            try {
                const data = await apiCall('GET', '/api/users');
                if (data) this.users = data.items || data.users || data || [];
            } catch (e) {
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '加载用户失败', type: 'error' } }));
            } finally {
                this.loading = false;
            }
        },

        getRoleLabel(role) {
            const labels = { 'admin': '管理员', 'operator': '运营', 'intern': '实习生' };
            return labels[role] || role;
        },

        openCreateModal() {
            this.editingUser = null;
            this.form = { username: '', password: '', role: 'intern' };
            this.showModal = true;
        },

        openEditModal(user) {
            this.editingUser = user;
            this.form = { username: user.username, password: '', role: user.role };
            this.showModal = true;
        },

        async saveUser() {
            this.saving = true;
            try {
                if (this.editingUser) {
                    const body = { role: this.form.role };
                    if (this.form.password) body.password = this.form.password;
                    await apiCall('PUT', `/api/users/${this.editingUser.id}`, body);
                } else {
                    await apiCall('POST', '/api/users', this.form);
                }
                this.showModal = false;
                await this.loadUsers();
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '保存成功', type: 'success' } }));
            } catch (e) {
                const msg = e.data?.error?.message || '保存失败';
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: msg, type: 'error' } }));
            } finally {
                this.saving = false;
            }
        },

        confirmDelete(user) {
            this.deleteTarget = user;
            this.showDeleteModal = true;
        },

        async deleteUser() {
            if (!this.deleteTarget) return;
            try {
                await apiCall('DELETE', `/api/users/${this.deleteTarget.id}`);
                this.showDeleteModal = false;
                await this.loadUsers();
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '用户已删除', type: 'success' } }));
            } catch (e) {
                const msg = e.data?.error?.message || '删除失败';
                document.dispatchEvent(new CustomEvent('show-toast', { detail: { message: msg, type: 'error' } }));
            }
        },

        formatTime(ts) {
            if (!ts) return '-';
            return new Date(ts).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
        }
    };
}
</script>
{% endblock %}
