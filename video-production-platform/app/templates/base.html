<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}视频生产平台{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="appState()" x-cloak>
    <!-- Toast Notification -->
    <div class="fixed top-4 right-4 z-50 space-y-2" x-show="toasts.length > 0">
        <template x-for="(toast, index) in toasts" :key="index">
            <div x-show="toast.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-4"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-x-0"
                 x-transition:leave-end="opacity-0 translate-x-4"
                 :class="{
                     'bg-green-50 border-green-400 text-green-800': toast.type === 'success',
                     'bg-red-50 border-red-400 text-red-800': toast.type === 'error',
                     'bg-yellow-50 border-yellow-400 text-yellow-800': toast.type === 'warning'
                 }"
                 class="border-l-4 p-4 rounded shadow-lg max-w-sm">
                <div class="flex items-center justify-between">
                    <p class="text-sm font-medium" x-text="toast.message"></p>
                    <button @click="removeToast(index)" class="ml-4 text-gray-400 hover:text-gray-600 cursor-pointer">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </template>
    </div>

    <!-- Navigation -->
    <nav class="bg-gray-800 shadow-lg" x-data="{ mobileMenuOpen: false }">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="/" class="text-white font-bold text-lg cursor-pointer">视频生产平台</a>
                </div>

                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center space-x-4">
                    <a href="/assets" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200">素材库</a>
                    <a href="/tasks/new" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200">文案生成</a>
                    <a href="/tasks" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200">任务列表</a>
                    <a href="/batches" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200">批量任务</a>
                    <template x-if="currentUser && (currentUser.role === 'operator' || currentUser.role === 'admin')">
                        <a href="/reviews" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200">审核</a>
                    </template>
                    <template x-if="currentUser && currentUser.role === 'admin'">
                        <div class="flex items-center space-x-4">
                            <a href="/admin/config" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200">系统配置</a>
                            <a href="/admin/users" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200">用户管理</a>
                            <a href="/admin/forbidden-words" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200">违禁词管理</a>
                        </div>
                    </template>
                </div>

                <!-- User Info & Logout (Desktop) -->
                <div class="hidden md:flex items-center space-x-3">
                    <template x-if="currentUser">
                        <div class="flex items-center space-x-3">
                            <span class="text-gray-300 text-sm" x-text="currentUser.username"></span>
                            <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded" x-text="getRoleLabel(currentUser.role)"></span>
                            <button @click="logout()" class="text-gray-400 hover:text-white text-sm cursor-pointer transition-colors duration-200">退出登录</button>
                        </div>
                    </template>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden">
                    <button @click="mobileMenuOpen = !mobileMenuOpen" class="text-gray-400 hover:text-white cursor-pointer">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path x-show="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            <path x-show="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div x-show="mobileMenuOpen" class="md:hidden bg-gray-700">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a href="/assets" class="text-gray-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium cursor-pointer">素材库</a>
                <a href="/tasks/new" class="text-gray-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium cursor-pointer">文案生成</a>
                <a href="/tasks" class="text-gray-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium cursor-pointer">任务列表</a>
                <a href="/batches" class="text-gray-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium cursor-pointer">批量任务</a>
                <template x-if="currentUser && (currentUser.role === 'operator' || currentUser.role === 'admin')">
                    <a href="/reviews" class="text-gray-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium cursor-pointer">审核</a>
                </template>
                <template x-if="currentUser && currentUser.role === 'admin'">
                    <div>
                        <a href="/admin/config" class="text-gray-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium cursor-pointer">系统配置</a>
                        <a href="/admin/users" class="text-gray-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium cursor-pointer">用户管理</a>
                        <a href="/admin/forbidden-words" class="text-gray-300 hover:text-white block px-3 py-2 rounded-md text-base font-medium cursor-pointer">违禁词管理</a>
                    </div>
                </template>
            </div>
            <template x-if="currentUser">
                <div class="border-t border-gray-600 px-4 py-3">
                    <span class="text-gray-300 text-sm" x-text="currentUser.username"></span>
                    <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded ml-2" x-text="getRoleLabel(currentUser.role)"></span>
                    <button @click="logout()" class="block mt-2 text-gray-400 hover:text-white text-sm cursor-pointer">退出登录</button>
                </div>
            </template>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Scripts -->
    <script>
        // JWT Token Management
        const TOKEN_KEY = 'jwt_token';
        const USER_KEY = 'current_user';

        function getToken() {
            return localStorage.getItem(TOKEN_KEY);
        }

        function setToken(token) {
            localStorage.setItem(TOKEN_KEY, token);
        }

        function removeToken() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
        }

        function getCurrentUser() {
            const userStr = localStorage.getItem(USER_KEY);
            if (userStr) {
                try { return JSON.parse(userStr); } catch(e) { return null; }
            }
            return null;
        }

        function setCurrentUser(user) {
            localStorage.setItem(USER_KEY, JSON.stringify(user));
        }

        // Global API Call Helper
        async function apiCall(method, url, body = null) {
            const headers = { 'Content-Type': 'application/json' };
            const token = getToken();
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            const options = { method, headers };
            if (body && method !== 'GET') {
                options.body = JSON.stringify(body);
            }
            const response = await fetch(url, options);
            if (response.status === 401) {
                removeToken();
                window.location.href = '/login';
                return null;
            }
            // 204 No Content - no body to parse
            if (response.status === 204) {
                return null;
            }
            const data = await response.json();
            if (!response.ok) {
                throw { status: response.status, data };
            }
            return data;
        }

        // File upload helper (multipart/form-data)
        async function apiUpload(url, formData) {
            const headers = {};
            const token = getToken();
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            const response = await fetch(url, { method: 'POST', headers, body: formData });
            if (response.status === 401) {
                removeToken();
                window.location.href = '/login';
                return null;
            }
            const data = await response.json();
            if (!response.ok) {
                throw { status: response.status, data };
            }
            return data;
        }

        // Alpine.js Global State
        function appState() {
            return {
                currentUser: getCurrentUser(),
                toasts: [],

                getRoleLabel(role) {
                    const labels = { 'admin': '管理员', 'operator': '运营', 'intern': '实习生' };
                    return labels[role] || role;
                },

                showToast(message, type = 'success', duration = 3000) {
                    const toast = { message, type, visible: true };
                    this.toasts.push(toast);
                    setTimeout(() => {
                        toast.visible = false;
                        setTimeout(() => {
                            this.toasts = this.toasts.filter(t => t !== toast);
                        }, 200);
                    }, duration);
                },

                removeToast(index) {
                    this.toasts[index].visible = false;
                    setTimeout(() => {
                        this.toasts.splice(index, 1);
                    }, 200);
                },

                logout() {
                    removeToken();
                    window.location.href = '/login';
                },

                init() {
                    // Redirect to login if no token (except on login page)
                    if (!getToken() && !window.location.pathname.startsWith('/login')) {
                        window.location.href = '/login';
                    }
                }
            };
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
