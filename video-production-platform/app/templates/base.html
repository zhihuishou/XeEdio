<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}XeEdio{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        [x-cloak] {
            display: none !important;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 56px;
            transition: width 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            background: #ffffff;
            border-right: 1px solid #f1f5f9;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            overflow: hidden;
        }

        .sidebar:hover {
            width: 180px;
        }

        .sidebar:hover .nav-label {
            opacity: 1;
            width: auto;
        }

        .sidebar:hover .sidebar-logo-full {
            display: flex;
        }

        .sidebar:hover .sidebar-logo-icon {
            display: none;
        }

        .sidebar-logo-full {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 4px 16px 12px;
            width: 100%;
        }

        .sidebar-logo-icon {
            display: flex;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: calc(100% - 16px);
            margin: 1px 8px;
            padding: 9px 10px;
            border-radius: 10px;
            color: #94a3b8;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .nav-item:hover {
            background: #f8fafc;
            color: #334155;
        }

        .nav-item.active {
            background: #f1f5f9;
            color: #334155;
        }

        .nav-item svg {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
        }

        .nav-label {
            opacity: 0;
            width: 0;
            overflow: hidden;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        /* ─── Layout ─── */
        .main-area {
            margin-left: 56px;
            min-height: 100vh;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top bar ─── */
        .topbar {
            height: 52px;
            background: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 30;
        }

        /* ─── Toast ─── */
        .toast-success {
            background: #f0fdf4;
            border-left: 4px solid #4ade80;
            color: #166534;
        }

        .toast-error {
            background: #fef2f2;
            border-left: 4px solid #f87171;
            color: #991b1b;
        }

        .toast-warning {
            background: #fffbeb;
            border-left: 4px solid #fbbf24;
            color: #92400e;
        }

        /* ─── Shared card hover ─── */
        .card-lift {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-lift:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(148, 163, 184, 0.15);
        }

        .btn-primary {
            background: #334155;
            color: #fff;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
        }

        .btn-primary:hover {
            background: #1e293b;
        }

        .btn-outline {
            border: 1px solid #e2e8f0;
            color: #64748b;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-outline:hover {
            border-color: #cbd5e1;
            color: #334155;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen" x-data="appState()" x-cloak>

    <!-- Toast Notifications -->
    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] space-y-3 w-full max-w-sm" x-show="toasts.length > 0">
        <template x-for="(toast, index) in toasts" :key="index">
            <div x-show="toast.visible" x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 -translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
                x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0" :class="{
                     'bg-green-50 border-green-400 text-green-800': toast.type === 'success',
                     'bg-red-50 border-red-400 text-red-800': toast.type === 'error',
                     'bg-yellow-50 border-yellow-400 text-yellow-800': toast.type === 'warning'
                 }" class="border-l-4 p-4 rounded-xl shadow-xl backdrop-blur-md">
                <div class="flex items-center justify-between">
                    <p class="text-sm font-medium" x-text="toast.message"></p>
                    <button @click="removeToast(index)" class="ml-4 text-slate-400 hover:text-slate-600 cursor-pointer">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </template>
    </div>

    <!-- ═══ LEFT SIDEBAR ═══ -->
    <aside class="sidebar">

        <!-- Logo -->
        <div class="sidebar-logo-full">
            <div class="w-7 h-7 rounded-lg flex items-center justify-center"
                style="background:linear-gradient(135deg,#9b8ec4,#c8a0aa)">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <span class="text-sm font-bold text-slate-800">XeEdio</span>
        </div>
        <div class="sidebar-logo-icon mb-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center"
                style="background:linear-gradient(135deg,#9b8ec4,#c8a0aa)">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                </svg>
            </div>
        </div>

        <!-- Nav Items -->
        <a href="/" class="nav-item {% block nav_home %}{% endblock %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="nav-label">首页</span>
        </a>

        <a href="/assets" class="nav-item {% block nav_assets %}{% endblock %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="nav-label">素材库</span>
        </a>

        <a href="/mix" class="nav-item {% block nav_mix %}{% endblock %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="nav-label">智能混剪</span>
        </a>

        <a href="/tasks" class="nav-item {% block nav_tasks %}{% endblock %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
            <span class="nav-label">任务列表</span>
        </a>

        <a href="/batches" class="nav-item {% block nav_batches %}{% endblock %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            <span class="nav-label">批量任务</span>
        </a>

        <template x-if="currentUser && (currentUser.role === 'operator' || currentUser.role === 'admin')">
            <a href="/reviews" class="nav-item {% block nav_reviews %}{% endblock %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="nav-label">审核</span>
            </a>
        </template>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- Bottom Section: Admin + User -->
        <template x-if="currentUser && currentUser.role === 'admin'">
            <a href="/admin/config" class="nav-item {% block nav_admin %}{% endblock %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="nav-label">系统设置</span>
            </a>
        </template>

        <!-- User Avatar -->
        <div class="nav-item" @click="logout()" title="退出登录" style="cursor:pointer">
            <div class="w-[18px] h-[18px] rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                style="background:linear-gradient(135deg,#9b8ec4,#c8a0aa)">
                <span x-text="currentUser ? currentUser.username.charAt(0).toUpperCase() : 'U'"></span>
            </div>
            <span class="nav-label text-slate-500" x-text="currentUser ? currentUser.username : ''"></span>
        </div>
    </aside>

    <!-- ═══ MAIN AREA ═══ -->
    <div class="main-area">
        <!-- Top bar -->
        <header class="topbar">
            <div class="flex-1">{% block topbar %}{% endblock %}</div>
            <div class="flex items-center gap-2 ml-auto">
                <template x-if="currentUser">
                    <div class="flex items-center gap-2">
                        <span class="text-xs px-2 py-1 rounded-full font-medium"
                            style="background:#f1f5f9;color:#475569" x-text="getRoleLabel(currentUser.role)"></span>
                    </div>
                </template>
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Global Scripts -->
    <script>
        const TOKEN_KEY = 'jwt_token';
        const USER_KEY = 'current_user';

        function getToken() { return localStorage.getItem(TOKEN_KEY); }
        function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
        function removeToken() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY); }
        function getCurrentUser() {
            const s = localStorage.getItem(USER_KEY);
            if (s) { try { return JSON.parse(s); } catch (e) { } }
            return null;
        }
        function setCurrentUser(u) { localStorage.setItem(USER_KEY, JSON.stringify(u)); }

        async function apiCall(method, url, body = null) {
            const headers = { 'Content-Type': 'application/json' };
            const token = getToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const opts = { method, headers };
            if (body && method !== 'GET') opts.body = JSON.stringify(body);
            const r = await fetch(url, opts);
            if (r.status === 401) { removeToken(); window.location.href = '/login'; return null; }
            if (r.status === 204) return null;
            const data = await r.json();
            if (!r.ok) throw { status: r.status, data };
            return data;
        }

        async function apiUpload(url, formData) {
            const headers = {};
            const token = getToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const r = await fetch(url, { method: 'POST', headers, body: formData });
            if (r.status === 401) { removeToken(); window.location.href = '/login'; return null; }
            const data = await r.json();
            if (!r.ok) throw { status: r.status, data };
            return data;
        }

        function appState() {
            return {
                currentUser: getCurrentUser(),
                toasts: [],
                getRoleLabel(role) {
                    return { admin: '管理员', operator: '运营', intern: '实习生' }[role] || role;
                },
                showToast(message, type = 'success', duration = 5000) {
                    const id = Date.now() + Math.random();
                    const toast = { id, message, type, visible: true };
                    this.toasts.push(toast);
                    setTimeout(() => {
                        const t = this.toasts.find(x => x.id === id);
                        if (t) {
                            t.visible = false;
                            setTimeout(() => { this.toasts = this.toasts.filter(x => x.id !== id); }, 500);
                        }
                    }, duration);
                },
                removeToast(index) {
                    const toast = this.toasts[index];
                    if (toast) {
                        toast.visible = false;
                        setTimeout(() => { this.toasts = this.toasts.filter(x => x.id !== toast.id); }, 500);
                    }
                },
                logout() { removeToken(); window.location.href = '/login'; },
                init() {
                    if (!getToken() && !window.location.pathname.startsWith('/login')) {
                        window.location.href = '/login';
                    }
                }
            };
        }
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
