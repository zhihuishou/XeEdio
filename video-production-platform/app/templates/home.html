<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XeEdio - AI 矩阵中枢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .gradient-glow {
            background: linear-gradient(135deg, rgba(147,130,220,0.08), rgba(200,150,170,0.08));
        }
        .card-hover-glow {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(147,130,220,0.12), 0 2px 8px rgba(200,150,170,0.08);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #9b8ec4, #c8a0aa);
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #8a7db5, #b8909a);
        }
        .tag-gradient {
            background: linear-gradient(135deg, rgba(147,130,220,0.1), rgba(200,150,170,0.1));
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="homePage()" x-cloak>

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 rounded-xl btn-gradient flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <span class="text-lg font-semibold text-slate-900 tracking-tight">XeEdio</span>
                </div>
                <div class="flex items-center space-x-5">
                    <a href="/assets" class="text-sm text-slate-500 hover:text-slate-800 transition-colors">素材库</a>
                    <a href="/tasks" class="text-sm text-slate-500 hover:text-slate-800 transition-colors">任务</a>
                    <template x-if="currentUser && currentUser.role === 'admin'">
                        <a href="/admin/config" class="text-sm text-slate-500 hover:text-slate-800 transition-colors">设置</a>
                    </template>
                    <div class="h-4 w-px bg-slate-200"></div>
                    <div class="flex items-center space-x-2">
                        <div class="tag-gradient px-3 py-1 rounded-full">
                            <span class="text-xs font-medium text-slate-600">⚡ 2,400 Credit</span>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center">
                            <span class="text-xs font-medium text-slate-600" x-text="currentUser ? currentUser.username.charAt(0).toUpperCase() : 'U'"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 lg:px-8 py-12">

        <!-- Greeting -->
        <div class="mb-10">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Hi, 欢迎回到 AI 矩阵中枢</h1>
            <p class="text-slate-500 mt-2 text-base">选择一个模块开始你的创作流程</p>
        </div>

        <!-- Bento Box Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 auto-rows-fr">

            <!-- Card A: 智能视频剪辑 (spans 2 cols) -->
            <a href="/mix" class="md:col-span-2 lg:row-span-2 bg-white rounded-3xl p-7 shadow-sm shadow-slate-200/50 card-hover-glow cursor-pointer flex flex-col justify-between min-h-[280px] relative overflow-hidden group">
                <div>
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-100 to-pink-50 flex items-center justify-center mb-5">
                        <svg class="w-6 h-6 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold text-slate-900 mb-2">智能视频剪辑</h2>
                    <p class="text-sm text-slate-500 leading-relaxed">高并发毫秒级渲染，支持视觉意象脱敏替换。</p>
                </div>
                <div class="mt-6">
                    <span class="tag-gradient text-xs font-medium text-slate-500 px-3 py-1.5 rounded-full">已生成 1,545 条短视频</span>
                </div>
                <!-- Decorative gradient blob -->
                <div class="absolute -bottom-10 -right-10 w-40 h-40 rounded-full bg-gradient-to-br from-violet-100/40 to-pink-100/40 blur-2xl group-hover:scale-110 transition-transform duration-500"></div>
            </a>

            <!-- Card B: 智镜视频解析 -->
            <div class="bg-white rounded-3xl p-6 shadow-sm shadow-slate-200/50 card-hover-glow cursor-pointer flex flex-col justify-between min-h-[130px] relative overflow-hidden opacity-60">
                <div>
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-100 to-cyan-50 flex items-center justify-center mb-4">
                        <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1.5">智镜视频解析</h3>
                    <p class="text-xs text-slate-500 leading-relaxed">一键剥离全网竞品爆款要素，深度逆向拆解。</p>
                </div>
                <span class="text-xs text-slate-400 mt-3">即将上线</span>
            </div>

            <!-- Card C: AI 视频翻译 -->
            <div class="bg-white rounded-3xl p-6 shadow-sm shadow-slate-200/50 card-hover-glow cursor-pointer flex flex-col justify-between min-h-[130px] relative overflow-hidden opacity-60">
                <div>
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-100 to-teal-50 flex items-center justify-center mb-4">
                        <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                        </svg>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1.5">AI 视频翻译</h3>
                    <p class="text-xs text-slate-500 leading-relaxed">搭载顶级同传引擎，跨越文化禁忌的母语级出海。</p>
                </div>
                <div class="flex items-center space-x-1 mt-3">
                    <span class="text-xs">🇺🇸</span><span class="text-xs">🇯🇵</span><span class="text-xs">🇰🇷</span><span class="text-xs">🇹🇭</span>
                    <span class="text-xs text-slate-400 ml-1">即将上线</span>
                </div>
            </div>

            <!-- Card D: AI 写脚本 -->
            <div class="bg-white rounded-3xl p-6 shadow-sm shadow-slate-200/50 card-hover-glow cursor-pointer flex flex-col justify-between min-h-[130px] relative overflow-hidden opacity-60">
                <div>
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-100 to-orange-50 flex items-center justify-center mb-4">
                        <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        <!-- Sparkle -->
                        <div class="absolute top-2 right-3 w-2 h-2 bg-amber-300 rounded-full animate-pulse"></div>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1.5">AI 写脚本</h3>
                    <p class="text-xs text-slate-500 leading-relaxed">实时接入 RAG 风控知识库，生成高转化合规私密文案。</p>
                </div>
                <span class="text-xs text-slate-400 mt-3">即将上线</span>
            </div>

            <!-- Card E: AI 一键成片 (spans 2 cols, gradient bg) -->
            <div class="md:col-span-2 lg:col-span-1 gradient-glow rounded-3xl p-6 shadow-sm shadow-slate-200/50 card-hover-glow cursor-pointer flex flex-col justify-between min-h-[130px] relative overflow-hidden border border-slate-100/80 opacity-60">
                <div>
                    <div class="w-10 h-10 rounded-xl bg-white/80 flex items-center justify-center mb-4">
                        <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <h3 class="text-base font-bold text-slate-900 mb-1.5">AI 一键成片</h3>
                    <p class="text-xs text-slate-500 leading-relaxed">输入主题与基础素材，Agent 全自动接管矩阵生产流。</p>
                </div>
                <span class="text-xs text-slate-400 mt-3">即将上线</span>
            </div>

        </div>
    </main>

    <script>
        const TOKEN_KEY = 'jwt_token';
        const USER_KEY = 'current_user';

        function getCurrentUser() {
            const s = localStorage.getItem(USER_KEY);
            if (s) { try { return JSON.parse(s); } catch(e) {} }
            return null;
        }

        function homePage() {
            return {
                currentUser: getCurrentUser(),
                init() {
                    if (!localStorage.getItem(TOKEN_KEY) && !window.location.pathname.startsWith('/login')) {
                        window.location.href = '/login';
                    }
                }
            };
        }
    </script>
</body>
</html>
