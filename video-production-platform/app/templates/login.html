<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 视频生产平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center" x-cloak>
    <div class="w-full max-w-md" x-data="loginForm()">
        <div class="bg-white shadow-lg rounded-lg p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">视频生产平台</h1>
                <p class="text-gray-500 mt-2 text-sm">请登录以继续</p>
            </div>

            <!-- Error Message -->
            <div x-show="errorMsg" x-transition class="bg-red-50 border-l-4 border-red-400 text-red-700 p-3 rounded mb-4">
                <p class="text-sm" x-text="errorMsg"></p>
            </div>

            <form @submit.prevent="handleLogin()">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="username" x-model="username" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="请输入用户名">
                </div>

                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" x-model="password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="请输入密码">
                </div>

                <button type="submit" :disabled="loading"
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading">登录</span>
                    <span x-show="loading" class="flex items-center justify-center">
                        <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        登录中...
                    </span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const TOKEN_KEY = 'jwt_token';
        const USER_KEY = 'current_user';

        function loginForm() {
            return {
                username: '',
                password: '',
                loading: false,
                errorMsg: '',

                async handleLogin() {
                    this.loading = true;
                    this.errorMsg = '';
                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: this.username, password: this.password })
                        });
                        const data = await response.json();
                        if (!response.ok) {
                            this.errorMsg = data.error?.message || '登录失败，请检查用户名和密码';
                            return;
                        }
                        localStorage.setItem(TOKEN_KEY, data.access_token);
                        localStorage.setItem(USER_KEY, JSON.stringify({
                            username: data.username || this.username,
                            role: data.role
                        }));
                        window.location.href = '/tasks';
                    } catch (e) {
                        this.errorMsg = '网络错误，请稍后重试';
                    } finally {
                        this.loading = false;
                    }
                }
            };
        }
    </script>
</body>
</html>
