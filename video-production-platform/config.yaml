# ============================================================
# 默认配置文件（模板）
# 实际使用请通过 APP_ENV 环境变量选择对应配置：
#   APP_ENV=dev   → config.dev.yaml
#   APP_ENV=test  → config.test.yaml
#   APP_ENV=aix   → config.aix.yaml
# 如果未设置 APP_ENV，则加载此文件作为 fallback
# ============================================================

app:
  env: dev
  debug: true
  log_level: DEBUG

llm:
  providers:
    deepseek:
      name: "DeepSeek"
      api_url: "https://api.deepseek.com/v1/chat/completions"
      api_key: ""
      model: "deepseek-chat"
      key_hint: "从 platform.deepseek.com 获取"

    doubao:
      name: "doubao-pro"
      api_url: "https://ark.cn-beijing.volces.com/api/v3/chat/completions"
      api_key: ""
      model: "doubao-pro-32k"
      key_hint: "从火山引擎控制台获取"

    gpt-4o-mini:
      name: "gpt-4o-mini"
      api_url: "https://api.luxee.ai/v1/chat/completions"
      api_key: ""
      model: "gpt-5.4"
      key_hint: "从 platform.openai.com 获取"

  default_provider: "gpt-4o-mini"

vlm:
  api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
  api_key: "sk-92ae3f703c814454a5537ab42c860f3d"
  model: "qwen3-vl-plus"
  frame_interval: 2
  max_frames: 30

ai_tts:
  provider: "dashscope"
  api_key: "sk-92ae3f703c814454a5537ab42c860f3d"
  model: "cosyvoice-v2"
  voice: "longyingtian"
  fallback_to_edge_tts: true

tts:
  voices: "zh-CN-XiaoxiaoNeural,zh-CN-YunxiNeural"
  speed: "+0%"
  volume: "+0%"

video:
  resolution: "1080x1920"
  bitrate: "8M"
  format: "mp4"

upload:
  max_size_mb: 500
  allowed_formats: "mp4,mov,avi,jpg,png,webp,mp3,wav,aac"

batch:
  max_concurrency: 3

embedding:
  api_url: ""
  api_key: ""
  model: "text-embedding-3-small"

pexels:
  api_key: "P6KSrRWsl3RgerXTOpfkJE3LuwTyQBJt13xvXvWShyWJRjn8H3MOfoWB"
